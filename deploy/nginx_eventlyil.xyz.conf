# Example nginx config: HTTPS terminates here, Rust stays HTTP on localhost.
#
# Assumes certbot already configured:
# - /etc/letsencrypt/live/eventlyil.xyz/fullchain.pem
# - /etc/letsencrypt/live/eventlyil.xyz/privkey.pem
#
# Recommended: serve your website on / and proxy the backend on /api/
#
# After editing:
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name eventlyil.xyz www.eventlyil.xyz;

    # If you have a static site:
    # root /var/www/eventlyil.xyz;
    # index index.html;

    # Backend (Axum) behind /api/
    location /api/ {
        proxy_pass http://127.0.0.1:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # If you ever add websockets:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Optional: health check without /api prefix
    # location = /healthz {
    #     proxy_pass http://127.0.0.1:8080/;
    # }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/eventlyil.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eventlyil.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Redirect HTTP -> HTTPS
server {
    listen 80;
    server_name eventlyil.xyz www.eventlyil.xyz;
    return 301 https://$host$request_uri;
}

