<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Downloader</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 16px;
        }

        /* Search */
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 1rem;
            outline: none;
            direction: ltr;
            text-align: left;
        }

        .search-box input:focus { border-color: #833ab4; }

        .search-box button {
            padding: 14px 28px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #833ab4, #fd1d1d);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-box button:hover { opacity: 0.9; }
        .search-box button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #833ab4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Profile Card */
        .profile-card {
            display: none;
            background: #1a1a1a;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid #2a2a2a;
        }

        .profile-top {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .profile-pic {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #833ab4;
        }

        .profile-info h2 {
            font-size: 1.3rem;
            color: #fff;
        }

        .profile-info .fullname {
            color: #888;
            font-size: 0.9rem;
        }

        .profile-info .badges {
            display: flex;
            gap: 6px;
            margin-top: 4px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 20px;
            background: #2a2a2a;
            color: #aaa;
        }

        .badge.verified { background: #1d9bf0; color: #fff; }
        .badge.private { background: #fd1d1d33; color: #fd1d1d; }

        .profile-stats {
            display: flex;
            gap: 24px;
            margin-bottom: 12px;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
        }

        .bio {
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
        }

        /* Tabs */
        .tabs {
            display: none;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .tabs button {
            padding: 12px 20px;
            background: none;
            border: none;
            color: #888;
            font-size: 0.95rem;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tabs button.active {
            color: #fff;
            border-bottom-color: #833ab4;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
        }

        .post-item {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: #1a1a1a;
        }

        .post-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }

        .post-item:hover img { transform: scale(1.05); }

        .post-item .video-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }

        .post-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .post-item:hover .post-overlay { opacity: 1; }

        .post-overlay span {
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Modal */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-bg.active { display: flex; }

        .modal {
            background: #1a1a1a;
            border-radius: 16px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid #333;
        }

        .modal-media {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: #000;
            border-radius: 16px 16px 0 0;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-caption {
            font-size: 0.9rem;
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 16px;
            white-space: pre-wrap;
            direction: ltr;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
        }

        .modal-date {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #833ab4, #fd1d1d);
            color: white;
        }

        .btn-secondary {
            background: #2a2a2a;
            color: #ccc;
        }

        .btn:hover { opacity: 0.85; }

        .modal-close {
            position: absolute;
            top: 16px;
            left: 16px;
            background: rgba(0,0,0,0.6);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 101;
        }

        /* Collage section */
        .collage-section {
            display: none;
        }

        .collage-drop {
            border: 2px dashed #444;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        .collage-drop.dragover { border-color: #833ab4; }

        .collage-preview {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .collage-preview .slot {
            aspect-ratio: 1;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 1px solid #333;
        }

        .collage-preview .slot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .collage-preview .slot .remove-slot {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .collage-preview .slot.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 0.85rem;
        }

        .collage-options {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .collage-options label {
            font-size: 0.85rem;
            color: #aaa;
        }

        .collage-options input[type="number"] {
            width: 80px;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #fff;
            font-size: 0.9rem;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #333;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: transform 0.3s;
            z-index: 200;
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        .error-msg {
            text-align: center;
            padding: 40px;
            color: #fd1d1d;
            display: none;
        }

        @media (max-width: 600px) {
            .posts-grid { grid-template-columns: repeat(3, 1fr); gap: 2px; }
            .profile-top { flex-direction: column; text-align: center; }
            .profile-stats { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Instagram Downloader</h1>
</div>

<div class="container">
    <div class="search-box">
        <input type="text" id="username" placeholder="Enter Instagram username..." autocomplete="off">
        <button id="searchBtn" onclick="search()">Search</button>
    </div>

    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <div class="error-msg" id="error"></div>

    <div class="profile-card" id="profileCard">
        <div class="profile-top">
            <img class="profile-pic" id="profilePic" src="" alt="">
            <div class="profile-info">
                <h2 id="profileUsername"></h2>
                <div class="fullname" id="profileFullname"></div>
                <div class="badges" id="profileBadges"></div>
            </div>
        </div>
        <div class="profile-stats" id="profileStats"></div>
        <div class="bio" id="profileBio"></div>
    </div>

    <div class="tabs" id="tabs">
        <button class="active" onclick="switchTab('posts', this)">Posts</button>
        <button onclick="switchTab('collage', this)">Collage</button>
    </div>

    <div id="postsSection">
        <div class="posts-grid" id="postsGrid"></div>
    </div>

    <div class="collage-section" id="collageSection">
        <p style="color:#aaa; margin-bottom: 16px; font-size: 0.9rem;">
            Choose 4 images from the posts above (click on them) or upload your own.
        </p>
        <div class="collage-preview" id="collagePreview">
            <div class="slot empty">1</div>
            <div class="slot empty">2</div>
            <div class="slot empty">3</div>
            <div class="slot empty">4</div>
        </div>
        <div class="collage-options">
            <label>Size: <input type="number" id="collageSize" value="1080" min="200" max="4000"></label>
            <label>Gap: <input type="number" id="collageGap" value="0" min="0" max="50"></label>
            <button class="btn btn-primary" onclick="generateCollage()">Generate Collage</button>
            <button class="btn btn-secondary" onclick="clearCollage()">Clear</button>
            <label class="btn btn-secondary" style="cursor:pointer">
                Upload Images
                <input type="file" accept="image/*" multiple hidden onchange="uploadToCollage(this.files)">
            </label>
        </div>
    </div>
</div>

<!-- Post Modal -->
<div class="modal-bg" id="modal" onclick="closeModal(event)">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal">
        <img class="modal-media" id="modalMedia" src="">
        <video class="modal-media" id="modalVideo" controls style="display:none"></video>
        <div class="modal-body">
            <div class="modal-caption" id="modalCaption"></div>
            <div class="modal-date" id="modalDate"></div>
            <div class="modal-actions" id="modalActions"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
let currentPosts = [];
let collageSlots = [null, null, null, null];

const $ = id => document.getElementById(id);

// Enter key triggers search
$('username').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
});

async function search() {
    const username = $('username').value.trim().replace('@', '');
    if (!username) return;

    $('loading').style.display = 'block';
    $('error').style.display = 'none';
    $('profileCard').style.display = 'none';
    $('tabs').style.display = 'none';
    $('postsGrid').innerHTML = '';
    $('searchBtn').disabled = true;

    try {
        const resp = await fetch(`${API}/posts/${encodeURIComponent(username)}`);
        if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.detail || 'Failed to fetch');
        }

        const data = await resp.json();
        currentPosts = data.posts || [];

        if (data.profile) renderProfile(data.profile);
        renderPosts(currentPosts);

        $('tabs').style.display = 'block';
    } catch (e) {
        $('error').textContent = e.message;
        $('error').style.display = 'block';
    } finally {
        $('loading').style.display = 'none';
        $('searchBtn').disabled = false;
    }
}

function formatNum(n) {
    if (n == null) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toString();
}

function renderProfile(p) {
    $('profilePic').src = p.profile_pic_hd || p.profile_pic_url || '';
    $('profileUsername').textContent = '@' + p.username;
    $('profileFullname').textContent = p.full_name || '';

    let badges = '';
    if (p.is_verified) badges += '<span class="badge verified">Verified</span>';
    if (p.is_private) badges += '<span class="badge private">Private</span>';
    if (p.category) badges += `<span class="badge">${p.category}</span>`;
    $('profileBadges').innerHTML = badges;

    $('profileStats').innerHTML = `
        <div class="stat"><div class="stat-num">${formatNum(p.follower_count)}</div><div class="stat-label">Followers</div></div>
        <div class="stat"><div class="stat-num">${formatNum(p.following_count)}</div><div class="stat-label">Following</div></div>
        <div class="stat"><div class="stat-num">${formatNum(p.media_count)}</div><div class="stat-label">Posts</div></div>
    `;

    $('profileBio').textContent = p.biography || '';
    $('profileCard').style.display = 'block';
}

function renderPosts(posts) {
    const grid = $('postsGrid');
    grid.innerHTML = '';

    posts.forEach((post, i) => {
        const thumb = post.image_url || '';
        const div = document.createElement('div');
        div.className = 'post-item';
        div.innerHTML = `
            <img src="${thumb}" alt="" loading="lazy">
            ${post.is_video ? '<div class="video-badge">Video</div>' : ''}
            <div class="post-overlay"><span>View</span></div>
        `;
        div.onclick = () => openModal(i);
        grid.appendChild(div);
    });
}

function openModal(index) {
    const post = currentPosts[index];
    if (!post) return;

    const img = $('modalMedia');
    const vid = $('modalVideo');

    if (post.is_video && post.video_url) {
        img.style.display = 'none';
        vid.style.display = 'block';
        vid.src = post.video_url;
    } else {
        vid.style.display = 'none';
        vid.pause && vid.pause();
        img.style.display = 'block';
        img.src = post.image_url || '';
    }

    $('modalCaption').textContent = post.caption || '';
    $('modalDate').textContent = post.date || '';

    let actions = '';

    // Download buttons for all images
    if (post.all_images && post.all_images.length > 0) {
        post.all_images.forEach((url, i) => {
            const label = post.all_images.length > 1 ? `Download Image ${i + 1}` : 'Download Image';
            actions += `<a class="btn btn-primary" href="${API}/download?media_url=${encodeURIComponent(url)}" target="_blank">${label}</a>`;
        });
    }

    // Download buttons for all videos
    if (post.all_videos && post.all_videos.length > 0) {
        post.all_videos.forEach((url, i) => {
            const label = post.all_videos.length > 1 ? `Download Video ${i + 1}` : 'Download Video';
            actions += `<a class="btn btn-primary" href="${API}/download?media_url=${encodeURIComponent(url)}" target="_blank">${label}</a>`;
        });
    }

    // Open on Instagram
    if (post.url) {
        actions += `<a class="btn btn-secondary" href="${post.url}" target="_blank" rel="noopener">Open on Instagram</a>`;
    }

    // Add to collage
    if (post.image_url) {
        actions += `<button class="btn btn-secondary" onclick="addToCollageFromUrl('${post.image_url}')">Add to Collage</button>`;
    }

    $('modalActions').innerHTML = actions;
    $('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal(e) {
    if (e && e.target !== $('modal') && e.target !== document.querySelector('.modal-close') && !e.target.classList.contains('modal-bg')) return;
    $('modal').classList.remove('active');
    $('modalVideo').pause && $('modalVideo').pause();
    document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
});

function switchTab(tab, btn) {
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    $('postsSection').style.display = tab === 'posts' ? 'block' : 'none';
    $('collageSection').style.display = tab === 'collage' ? 'block' : 'none';
}

// Collage
function renderCollageSlots() {
    const preview = $('collagePreview');
    preview.innerHTML = '';
    collageSlots.forEach((slot, i) => {
        const div = document.createElement('div');
        div.className = 'slot' + (slot ? '' : ' empty');
        if (slot) {
            div.innerHTML = `<img src="${slot.preview}"><button class="remove-slot" onclick="removeCollageSlot(${i})">&times;</button>`;
        } else {
            div.textContent = i + 1;
        }
        preview.appendChild(div);
    });
}

function addToCollageFromUrl(url) {
    const emptyIndex = collageSlots.findIndex(s => s === null);
    if (emptyIndex === -1) {
        showToast('All 4 slots are full. Clear one first.');
        return;
    }
    collageSlots[emptyIndex] = { preview: url, url: url, type: 'url' };
    renderCollageSlots();
    showToast(`Added to slot ${emptyIndex + 1}`);
}

function uploadToCollage(files) {
    for (const file of files) {
        const emptyIndex = collageSlots.findIndex(s => s === null);
        if (emptyIndex === -1) break;
        const reader = new FileReader();
        reader.onload = e => {
            collageSlots[emptyIndex] = { preview: e.target.result, file: file, type: 'file' };
            renderCollageSlots();
        };
        reader.readAsDataURL(file);
    }
}

function removeCollageSlot(i) {
    collageSlots[i] = null;
    renderCollageSlots();
}

function clearCollage() {
    collageSlots = [null, null, null, null];
    renderCollageSlots();
}

async function generateCollage() {
    const filled = collageSlots.filter(s => s !== null);
    if (filled.length !== 4) {
        showToast('You need exactly 4 images');
        return;
    }

    const formData = new FormData();
    const size = parseInt($('collageSize').value) || 1080;
    const gap = parseInt($('collageGap').value) || 0;

    for (let i = 0; i < 4; i++) {
        const slot = collageSlots[i];
        if (slot.type === 'file') {
            formData.append('images', slot.file);
        } else {
            // Fetch the image from URL through our proxy and add as blob
            const resp = await fetch(`${API}/download?media_url=${encodeURIComponent(slot.url)}`);
            const blob = await resp.blob();
            formData.append('images', blob, `image_${i}.jpg`);
        }
    }

    showToast('Generating collage...');

    try {
        const resp = await fetch(`${API}/collage?size=${size}&gap=${gap}`, {
            method: 'POST',
            body: formData,
        });

        if (!resp.ok) throw new Error('Failed to generate collage');

        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'collage.jpg';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Collage downloaded!');
    } catch (e) {
        showToast('Error: ' + e.message);
    }
}

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

renderCollageSlots();
</script>
</body>
</html>
